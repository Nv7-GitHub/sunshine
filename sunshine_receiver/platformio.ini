[env:receiver]
platform = espressif32 @ 6.0.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 921600
upload_speed = 921600
; ── ESP32-S3-WROOM-1 N16R8: 16MB QIO flash + 8MB octal (OPI) PSRAM ──────────────
; qio_opi selects QIO flash + OPI PSRAM, the correct combo for N16R8. Octal PSRAM
; reserves GPIO33-37 (unused by this firmware). f_cpu 240MHz is the S3 max.
board_build.f_cpu              = 240000000L
board_build.flash_size         = 16MB
board_build.partitions         = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size        = 16MB
board_upload.maximum_size      = 16777216
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
