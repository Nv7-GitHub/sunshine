[env_base]
; Pinned to a known-good pioarduino release (was `stable`, a moving pointer that
; intermittently left framework-arduinoespressif32 unregistered → FRAMEWORK_DIR
; None / "MissingPackageManifestError"). 55.03.38 = Arduino core 3.3.8 + IDF libs
; 5.5.4. Revert to `stable` once pioarduino's stable pointer is reliable again.
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board       = esp32-s3-devkitc-1
framework   = arduino
monitor_speed  = 921600
upload_speed   = 921600
; ── ESP32-S3-WROOM-1 N16R8: 16MB QIO flash + 8MB octal (OPI) PSRAM ──────────────
; qio_opi selects QIO flash + OPI PSRAM, the correct combo for N16R8. Octal PSRAM
; reserves GPIO33-37 (unused by this firmware). f_cpu 240MHz is the S3 max.
board_build.f_cpu              = 240000000L
board_build.flash_size         = 16MB
board_build.partitions         = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size        = 16MB
board_upload.maximum_size      = 16777216
; Build the shared sunshine_core sources directly from the sibling directory
; instead of via symlinked files under lib/. Paths are relative to the project
; src dir (build_src_filter) and project dir (-I).
build_src_filter =
    +<*>
    +<../../sunshine_core/src/*.c>
build_flags    =
    -I ../sunshine_core/include
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
lib_deps =
    adafruit/Adafruit ADXL375 @ ^1.0.0
    adafruit/Adafruit LIS3MDL @ ^1.2.0

[env:bringup_1_sensors]
extends    = env_base
build_flags = ${env_base.build_flags} -DBRINGUP_LEVEL=1

[env:bringup_2_dshot]
extends    = env_base
build_flags = ${env_base.build_flags} -DBRINGUP_LEVEL=2

[env:bringup_3_telemetry]
extends    = env_base
build_flags = ${env_base.build_flags} -DBRINGUP_LEVEL=3

[env:bringup_4_navigation]
extends    = env_base
build_flags = ${env_base.build_flags} -DBRINGUP_LEVEL=4

[env:production]
extends    = env_base
build_flags = ${env_base.build_flags} -DBRINGUP_LEVEL=0
